---
# Flow: Alice logs in fresh, verifies all data persisted (demo local storage)
appId: com.ajayksingh.evenly
---

- launchApp:
    clearState: true
- waitForAnimationToEnd

# Skip onboarding if it appears
- tapOn:
    id: "onboarding-skip"
    optional: true
- waitForAnimationToEnd

# Dismiss any system crash dialogs
- tapOn:
    text: "Close app"
    optional: true
- tapOn:
    text: "OK"
    optional: true
- waitForAnimationToEnd

- assertVisible: "Continue with Google"
- runFlow:
    file: ./helpers/do_login.yaml

- extendedWaitUntil:
    visible:
      text: "Total balance"
    timeout: 15000

- tapOn: "Groups"
- waitForAnimationToEnd

# Verify groups exist
- extendedWaitUntil:
    visible:
      text: "E2E Test Group"
    timeout: 10000
    optional: true

# Go home and verify
- tapOn:
    text: "Home"
    optional: true
- waitForAnimationToEnd
- assertVisible: "Total balance"
