---
# Flow: Currency selection via Profile → Default Currency.
# Selects USD, EUR, and returns to INR, verifying the symbol updates.
appId: com.ajayksingh.evenly
---

- launchApp:
    clearState: false
- waitForAnimationToEnd

# === Login as User A (or reuse existing session) ===
- runFlow:
    when:
      visible: "Continue with Google"
    file: ./helpers/do_login.yaml

- extendedWaitUntil:
    visible:
      text: "Total balance"
    timeout: 30000

# === Navigate to Profile via header avatar ===
- tapOn:
    id: "header-avatar"
- waitForAnimationToEnd

# === Verify Profile screen loaded ===
- assertVisible:
    text: "Profile"
    optional: true

# === Tap Default Currency setting ===
- scrollUntilVisible:
    element:
      text: "Default Currency"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 10
- tapOn: "Default Currency"
- waitForAnimationToEnd

# === Verify currency list loads ===
- extendedWaitUntil:
    visible:
      text: "USD"
    timeout: 15000
- assertVisible:
    text: "EUR"
    optional: true
- assertVisible:
    text: "INR"
    optional: true

# ============================================================
# Section 1: Select USD — verify $ symbol
# ============================================================
- tapOn: "USD"
- waitForAnimationToEnd

# Navigate back to home to verify symbol update
- pressKey: Back
    optional: true
- tapOn:
    text: "Back"
    optional: true
- waitForAnimationToEnd

# May need to navigate all the way back to Home tab
- tapOn:
    text: "Home"
    optional: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: "Total balance"
    timeout: 15000

# Verify $ symbol appears in balances or header area
- assertVisible:
    text: "$"
    optional: true

# ============================================================
# Section 2: Select EUR — verify € symbol
# ============================================================
# Navigate back to Profile → Default Currency
- tapOn:
    id: "header-avatar"
- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      text: "Default Currency"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 10
- tapOn: "Default Currency"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: "EUR"
    timeout: 15000

- tapOn: "EUR"
- waitForAnimationToEnd

# Navigate back to Home
- pressKey: Back
    optional: true
- tapOn:
    text: "Back"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Home"
    optional: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: "Total balance"
    timeout: 15000

# Verify € symbol appears
- assertVisible:
    text: "€"
    optional: true

# ============================================================
# Section 3: Return to INR — restore default
# ============================================================
- tapOn:
    id: "header-avatar"
- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      text: "Default Currency"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 10
- tapOn: "Default Currency"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: "INR"
    timeout: 15000

- tapOn: "INR"
- waitForAnimationToEnd

# Navigate back to Home and confirm INR / ₹ symbol restored
- pressKey: Back
    optional: true
- tapOn:
    text: "Back"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Home"
    optional: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: "Total balance"
    timeout: 15000

- assertVisible:
    text: "₹"
    optional: true
