appId: com.ajayksingh.evenly
---
# Reusable: performs login via Alice Demo account tap.
# OAuth sign-in cannot be automated, so all automated tests use demo accounts.

# Skip onboarding if it appears
- tapOn:
    id: "onboarding-skip"
    optional: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Quick Demo Access"
    timeout: 15000

# Tap Alice Demo row to login
- tapOn: "Alice Demo"
- waitForAnimationToEnd

# Wait until auth screen is gone
- extendedWaitUntil:
    notVisible:
      text: "Continue with Google"
    timeout: 30000
