appId: com.ajayksingh.evenly
---
# Reusable: logs out the current user
- tapOn:
    id: "header-avatar"
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      text: "Sign Out"
    direction: DOWN
- tapOn: "Sign Out"
- waitForAnimationToEnd
# Confirm the "Are you sure?" sign out dialog
- tapOn: "SIGN OUT"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 15000
