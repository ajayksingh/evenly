---
# Flow: User A logs back in and verifies settlement was received
appId: com.ajayksingh.evenly
env:
  USER_A_EMAIL: deepsags@gmail.com
  USER_A_PASS: abc123
---

# --- Logout User B ---
- launchApp:
    clearState: false
- waitForAnimationToEnd
- tapOn:
    id: "header-avatar"
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      text: "Sign Out"
- tapOn: "Sign Out"
- waitForAnimationToEnd
# Confirm sign out dialog
- tapOn: "SIGN OUT"
- waitForAnimationToEnd

# --- Login as User A ---
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 15000
- tapOn:
    text: "Sign In"
    optional: true
- runFlow:
    file: ./helpers/do_login.yaml
    env:
      EMAIL: "deepsags@gmail.com"
      PASS: "abc123"

# --- Check home screen shows reduced/zero balance ---
- waitForAnimationToEnd
- assertVisible: "Total balance"

# --- Verify activity shows the settlement ---
- tapOn:
    text: "Activity"
    optional: true
- waitForAnimationToEnd

# --- Check group balances ---
- tapOn: "Groups"
- waitForAnimationToEnd
- tapOn: "E2E Test Group"
- waitForAnimationToEnd
- tapOn:
    id: "tab-balances"
- waitForAnimationToEnd

# Both expenses and settlement should be reflected
- assertVisible: "Group Balances"
