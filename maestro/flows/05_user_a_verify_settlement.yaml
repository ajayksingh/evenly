---
# Flow: Alice logs back in and verifies settlement was received
appId: com.ajayksingh.evenly
---

# --- Logout Bob ---
- launchApp:
    clearState: false
- waitForAnimationToEnd
- tapOn:
    id: "header-avatar"
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      text: "Sign Out"
- tapOn: "Sign Out"
- waitForAnimationToEnd
# Confirm sign out dialog
- tapOn: "SIGN OUT"
- waitForAnimationToEnd

# --- Login as Alice ---
- extendedWaitUntil:
    visible: "Continue with Google"
    timeout: 15000
- runFlow:
    file: ./helpers/do_login.yaml

# --- Check home screen shows reduced/zero balance ---
- waitForAnimationToEnd
- assertVisible: "Total balance"

# --- Verify activity shows the settlement ---
- tapOn:
    text: "Activity"
    optional: true
- waitForAnimationToEnd

# --- Check group balances ---
- tapOn: "Groups"
- waitForAnimationToEnd
- tapOn: "E2E Test Group"
- waitForAnimationToEnd
- tapOn:
    id: "tab-balances"
- waitForAnimationToEnd

# Both expenses and settlement should be reflected
- assertVisible: "Group Balances"
