---
# Flow: Full group lifecycle — create Trip & Household groups,
# verify both in list, open one and add User B as member.
appId: com.ajayksingh.evenly
env:
  USER_B_EMAIL: bob@demo.com
---

- launchApp:
    clearState: false
- waitForAnimationToEnd

# === Login as User A (or reuse existing session) ===
- runFlow:
    when:
      visible: "Continue with Google"
    file: ./helpers/do_login.yaml

- extendedWaitUntil:
    visible:
      text: "Total balance"
    timeout: 30000

# === Navigate to Groups tab ===
- tapOn: "Groups"
- waitForAnimationToEnd

# ============================================================
# Section 1: Create group type "Trip" named "Paris Trip"
# ============================================================
- tapOn:
    id: "fab-add-group"
- waitForAnimationToEnd
- assertVisible: "New Group"

# Select Trip group type
- tapOn:
    text: "Trip"
    optional: true
- tapOn:
    id: "group-type-trip"
    optional: true
- waitForAnimationToEnd

# Enter group name
- tapOn:
    id: "group-name-input"
- eraseText: 50
- inputText: "Paris Trip"
- hideKeyboard
- waitForAnimationToEnd

# Submit group creation
- tapOn: "Create"
- waitForAnimationToEnd

# Verify group was created and appears in the list
- extendedWaitUntil:
    visible:
      text: "Paris Trip"
    timeout: 15000

# Navigate back to Groups list for second group creation
- pressKey:
    key: Back
    optional: true
- tapOn:
    text: "Back"
    optional: true
- tapOn:
    text: "Groups"
    optional: true
- waitForAnimationToEnd

# ============================================================
# Section 2: Create group type "Household" named "Flat Share"
# ============================================================
- tapOn:
    id: "fab-add-group"
- waitForAnimationToEnd
- assertVisible: "New Group"

# Select Household group type
- tapOn:
    text: "Household"
    optional: true
- tapOn:
    id: "group-type-household"
    optional: true
- waitForAnimationToEnd

# Enter group name
- tapOn:
    id: "group-name-input"
- eraseText: 50
- inputText: "Flat Share"
- hideKeyboard
- waitForAnimationToEnd

- tapOn: "Create"
- waitForAnimationToEnd

# Verify "Flat Share" appears in the list
- extendedWaitUntil:
    visible:
      text: "Flat Share"
    timeout: 15000

# Navigate back to Groups list
- pressKey:
    key: Back
    optional: true
- tapOn:
    text: "Back"
    optional: true
- tapOn:
    text: "Groups"
    optional: true
- waitForAnimationToEnd

# ============================================================
# Section 3: Verify both groups appear in Groups list
# ============================================================
- extendedWaitUntil:
    visible:
      text: "Paris Trip"
    timeout: 10000

- scrollUntilVisible:
    element:
      text: "Flat Share"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 10

- assertVisible: "Flat Share"

# ============================================================
# Section 4: Open Paris Trip → Members tab → Add User B
# ============================================================
- tapOn: "Paris Trip"
- waitForAnimationToEnd

# Navigate to Members tab
- tapOn:
    id: "tab-members"
- waitForAnimationToEnd
- assertVisible: "members"

# Tap Add Member button → opens unified AddPeopleModal
- tapOn:
    id: "add-member-btn"
- waitForAnimationToEnd
- assertVisible: "Add Members"

# Switch to Search tab and search for User B
- tapOn:
    id: "tab-search"
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: "member-search-input"
- inputText: ${USER_B_EMAIL}

# Wait for debounced search results
- extendedWaitUntil:
    visible:
      text: "Ajay"
    timeout: 8000

- hideKeyboard
- waitForAnimationToEnd
# Tap the result to select/add
- tapOn:
    text: "Ajay"
    index: 0

# Wait for modal to close
- extendedWaitUntil:
    notVisible:
      text: "Cancel"
    timeout: 8000
- waitForAnimationToEnd

# ============================================================
# Section 5: Verify User B appears in members list
# ============================================================
# User B's display name is "Ajay" (from 00_setup_user_b.yaml)
- assertVisible: "Ajay"
