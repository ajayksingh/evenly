---
# Flow: Alice Demo logs in, creates group, adds expense
appId: com.ajayksingh.evenly
---

- launchApp:
    clearState: true
- tapOn:
    text: "Close app"
    optional: true
- tapOn:
    text: "OK"
    optional: true
# Skip onboarding if it appears
- tapOn:
    id: "onboarding-skip"
    optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Quick Demo Access"
    timeout: 30000
# Wait for entrance animation to finish before interacting
- waitForAnimationToEnd:
    timeout: 3000
- runFlow:
    file: ./helpers/do_login.yaml

# Wait for home screen
- extendedWaitUntil:
    visible:
      text: "Total balance"
    timeout: 30000

# Navigate to Groups
- tapOn: "Groups"
- waitForAnimationToEnd

# Create group via FAB
- tapOn:
    id: "fab-add-group"
- waitForAnimationToEnd
- assertVisible: "New Group"

- tapOn:
    id: "group-name-input"
- waitForAnimationToEnd
- inputText: "E2E Test Group"

- tapOn: "Create"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: "E2E Test Group"
    timeout: 15000

# Open the group
- tapOn: "E2E Test Group"
- waitForAnimationToEnd

# Add expense
- tapOn: "Add"
- waitForAnimationToEnd
- assertVisible: "Add Expense"

- tapOn:
    id: "expense-amount-input"
- inputText: "1200"

- tapOn:
    id: "expense-description-input"
- inputText: "Dinner at restaurant"

- tapOn:
    id: "expense-save-btn"
- waitForAnimationToEnd

# Verify expense persisted
- extendedWaitUntil:
    visible:
      text: "Dinner at restaurant"
    timeout: 10000

# Check balances tab
- tapOn:
    id: "tab-balances"
- waitForAnimationToEnd
- assertVisible: "Group Balances"

# Check members tab
- tapOn:
    id: "tab-members"
- waitForAnimationToEnd
- assertVisible: "members"
