---
# Setup flow: Ensure we start from auth screen with Bob Demo available.
# Registration via email is removed — Bob Demo account is built-in.
appId: com.ajayksingh.evenly
---

- launchApp:
    clearState: false
- waitForAnimationToEnd

# If already logged in as someone, logout first
- runFlow:
    when:
      notVisible: "Continue with Google"
    file: ./helpers/do_logout.yaml

- extendedWaitUntil:
    visible: "Continue with Google"
    timeout: 15000

# Login as Bob Demo
- runFlow:
    file: ./helpers/do_login_bob.yaml

# Verify we're on home screen
- extendedWaitUntil:
    visible: "Total balance"
    timeout: 15000

# Logout Bob to leave auth screen ready for next flow
- runFlow:
    file: ./helpers/do_logout.yaml

- extendedWaitUntil:
    visible: "Continue with Google"
    timeout: 15000
