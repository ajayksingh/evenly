---
# Flow: Full E2E — friends, multiple expenses, verify data persists
appId: com.ajayksingh.evenly
---

# === Alice Demo: Add Bob as friend if not already ===
- launchApp:
    clearState: false
- waitForAnimationToEnd

# Ensure logged in as Alice
- runFlow:
    when:
      visible: "Continue with Google"
    file: ./helpers/do_login.yaml

- waitForAnimationToEnd

# --- Navigate to Friends ---
- tapOn: "Friends"
- waitForAnimationToEnd

# Add Bob as friend (if not already added)
- runFlow:
    when:
      notVisible: "Bob Demo"
    commands:
      - tapOn:
          text: "Add Friend"
          optional: true
      - tapOn:
          id: "add-friend-input"
          optional: true
      - inputText: "bob@demo.com"
      - tapOn:
          text: "Add"
          optional: true
      - waitForAnimationToEnd

# Verify friend appears
- assertVisible:
    text: "Bob"
    optional: true

# --- Navigate to Groups and create/open group ---
- tapOn: "Groups"
- waitForAnimationToEnd

# Create new group if needed
- tapOn:
    id: "fab-add-group"
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: "group-name-input"
    optional: true
- inputText: "Maestro E2E Group"
  optional: true
- tapOn:
    text: "Create"
    optional: true
- waitForAnimationToEnd

- tapOn: "Maestro E2E Group"
- waitForAnimationToEnd

# --- Add expense ---
- tapOn: "Add"
- waitForAnimationToEnd

# Amount
- tapOn:
    id: "expense-amount-input"
- inputText: "900"

# Description
- tapOn:
    id: "expense-description-input"
- inputText: "Hotel stay"

# Save
- tapOn: "Save"
- waitForAnimationToEnd

# Verify it persisted
- assertVisible: "Hotel stay"

# --- Check Members tab ---
- tapOn:
    id: "tab-members"
- waitForAnimationToEnd
- assertVisible: "members"

# --- Verify back on Groups screen ---
- tapOn:
    text: "Back"
    optional: true
- tapOn:
    text: "Groups"
    optional: true
- waitForAnimationToEnd

# --- Go to Activity screen ---
- tapOn:
    text: "Activity"
    optional: true
- waitForAnimationToEnd

# --- Go to Home and pull-to-refresh ---
- tapOn:
    text: "Home"
    optional: true
- waitForAnimationToEnd
- swipe:
    direction: DOWN
    duration: 500
- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd
- assertVisible: "Total balance"
