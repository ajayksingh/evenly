---
# Flow: Bob Demo settles payment to Alice Demo
appId: com.ajayksingh.evenly
---

- launchApp:
    clearState: false
- waitForAnimationToEnd

# Navigate to Home first (header-avatar only exists on Home tab)
- tapOn:
    text: "Home"
    optional: true
- waitForAnimationToEnd
# Logout Alice and login as Bob
- runFlow:
    file: ./helpers/do_logout.yaml
- extendedWaitUntil:
    visible: "Continue with Google"
    timeout: 15000
- runFlow:
    file: ./helpers/do_login_bob.yaml

- extendedWaitUntil:
    visible:
      text: "Total balance"
    timeout: 30000

# --- Navigate to the group ---
- tapOn: "Groups"
- waitForAnimationToEnd
- tapOn: "E2E Test Group"
- waitForAnimationToEnd

# --- Go to Balances tab ---
- tapOn:
    id: "tab-balances"
- waitForAnimationToEnd

# --- Tap Record a Payment ---
- tapOn: "Record a Payment"
- waitForAnimationToEnd
- assertVisible: "Settle Up"

# --- Receiver: Alice Demo ---
- tapOn:
    text: "Alice"
    optional: true

# --- Amount ---
- tapOn:
    id: "settle-amount-input"
    optional: true
- eraseText: 10
- inputText: "600"

# --- Add note ---
- tapOn:
    text: "Add a note..."
- inputText: "Settling cab ride"

# --- Record payment ---
- tapOn: "Settle Up"
- waitForAnimationToEnd

# --- Verify success screen ---
- assertVisible: "All settled!"

# --- Wait for auto-navigation back ---
- waitForAnimationToEnd:
    timeout: 5000

# --- Verify balance updated on Home ---
- tapOn:
    text: "Home"
    optional: true
- waitForAnimationToEnd
