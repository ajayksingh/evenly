---
# Flow: User B settles payment to User A
appId: com.ajayksingh.evenly
env:
  USER_B_EMAIL: ajsworld@gmail.com
  USER_B_PASS: abc123
---

- launchApp:
    clearState: false
- waitForAnimationToEnd

# Navigate to Home first (header-avatar only exists on Home tab)
- tapOn:
    text: "Home"
    optional: true
- waitForAnimationToEnd
# Logout User A and login as User B
- runFlow:
    file: ./helpers/do_logout.yaml
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 15000
- runFlow:
    file: ./helpers/do_login.yaml
    env:
      EMAIL: ajsworld@gmail.com
      PASS: abc123

- extendedWaitUntil:
    visible:
      text: "Total balance"
    timeout: 30000

# --- Navigate to the group ---
- tapOn: "Groups"
- waitForAnimationToEnd
- tapOn: "E2E Test Group"
- waitForAnimationToEnd

# --- Go to Balances tab ---
- tapOn:
    id: "tab-balances"
- waitForAnimationToEnd

# --- Tap Record a Payment ---
- tapOn: "Record a Payment"
- waitForAnimationToEnd
- assertVisible: "Settle Up"

# --- Payer is User B (already selected as current user) ---
# --- Receiver: User A ---
- tapOn:
    text: "deepsags"
    optional: true
- tapOn:
    text: "Deep"
    optional: true

# --- Amount should be auto-suggested ---
# If not, enter manually
- tapOn:
    id: "settle-amount-input"
    optional: true
- eraseText: 10
- inputText: "600"

# --- Add note ---
- tapOn:
    text: "Add a note..."
- inputText: "Settling cab ride"

# --- Record payment ---
- tapOn: "Record Payment"
- waitForAnimationToEnd

# --- Verify success screen ---
- assertVisible: "Payment Successful!"

# --- Wait for auto-navigation back ---
- waitForAnimationToEnd:
    timeout: 5000

# --- Verify balance updated on Home ---
- tapOn:
    text: "Home"
    optional: true
- waitForAnimationToEnd
