---
# Flow: Bob Demo sees shared expenses and settles payment
appId: com.ajayksingh.evenly
---

- launchApp:
    clearState: true
- waitForAnimationToEnd

# Skip onboarding if it appears
- tapOn:
    id: "onboarding-skip"
    optional: true
- waitForAnimationToEnd

# Dismiss any system crash dialogs
- tapOn:
    text: "Close app"
    optional: true
- tapOn:
    text: "OK"
    optional: true
- waitForAnimationToEnd

- assertVisible: "Continue with Google"
- runFlow:
    file: ./helpers/do_login_bob.yaml

- extendedWaitUntil:
    visible:
      text: "Total balance"
    timeout: 15000

- tapOn: "Groups"
- waitForAnimationToEnd

- tapOn: "E2E Test Group"
- waitForAnimationToEnd

# Both expenses from Alice visible to Bob
- extendedWaitUntil:
    visible:
      text: "Dinner at restaurant"
    timeout: 10000
- assertVisible: "Cab ride home"

# Balances: Bob owes Alice
- tapOn:
    id: "tab-balances"
- waitForAnimationToEnd
- assertVisible: "Group Balances"

# Settle up
- tapOn: "Record a Payment"
- waitForAnimationToEnd
- assertVisible: "Settle Up"

# Select receiver (Alice = first non-payer)
- tapOn:
    id: "settle-receiver-first"
- waitForAnimationToEnd

# Enter amount
- tapOn:
    id: "settle-amount-input"
- eraseText: 10
- inputText: "900"
- hideKeyboard
- waitForAnimationToEnd

- tapOn:
    id: "settle-record-btn"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: "All settled!"
    timeout: 8000

- waitForAnimationToEnd:
    timeout: 6000
