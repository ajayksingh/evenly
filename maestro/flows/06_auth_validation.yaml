---
# Flow: Auth screen validation — Google button visible, demo login works, logout works
appId: com.ajayksingh.evenly
---

- launchApp:
    clearState: true
- waitForAnimationToEnd

# Dismiss any system crash dialogs
- tapOn:
    text: "Close app"
    optional: true
- tapOn:
    text: "OK"
    optional: true
- waitForAnimationToEnd

# Skip onboarding if it appears
- tapOn:
    id: "onboarding-skip"
    optional: true
- tapOn:
    text: "Skip"
    optional: true
- tapOn:
    text: "Get Started"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# === Section 1: Verify auth screen UI elements ===
- extendedWaitUntil:
    visible: "Continue with Google"
    timeout: 30000
- waitForAnimationToEnd:
    timeout: 3000

# App branding visible
- assertVisible: "Evenly"
- assertVisible: "Split expenses with friends, effortlessly"

# Google sign-in button visible
- assertVisible:
    id: "auth-google-btn"

# Demo access card visible
- assertVisible: "Quick Demo Access"
- assertVisible: "Alice Demo"
- assertVisible: "Bob Demo"

# Terms text visible (may need scroll on smaller screens)
- scrollUntilVisible:
    element:
      text: "Terms of Service"
    direction: DOWN
    timeout: 5000
    optional: true

# === Section 2: Demo account login (Alice Demo) ===
- tapOn: "Alice Demo"
- waitForAnimationToEnd

# Should land on home screen
- extendedWaitUntil:
    visible:
      text: "Total balance"
    timeout: 15000

# === Section 3: Logout and verify return to auth screen ===
- runFlow:
    file: ./helpers/do_logout.yaml

- extendedWaitUntil:
    visible: "Continue with Google"
    timeout: 15000

# === Section 4: Demo account login (Bob Demo) ===
- tapOn: "Bob Demo"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: "Total balance"
    timeout: 15000

# Logout Bob
- runFlow:
    file: ./helpers/do_logout.yaml

- extendedWaitUntil:
    visible: "Continue with Google"
    timeout: 15000
