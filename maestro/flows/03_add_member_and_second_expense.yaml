---
# Flow: Alice adds Bob as member, adds second expense
appId: com.ajayksingh.evenly
env:
  USER_B_EMAIL: bob@demo.com
---

- launchApp:
    clearState: false
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Continue with Google"
    file: ./helpers/do_login.yaml

- extendedWaitUntil:
    visible:
      text: "Total balance"
    timeout: 30000

- tapOn: "Groups"
- waitForAnimationToEnd
- tapOn: "E2E Test Group"
- waitForAnimationToEnd

# Members tab → Add Bob Demo via unified AddPeopleModal
- tapOn:
    id: "tab-members"
- waitForAnimationToEnd
- tapOn:
    id: "add-member-btn"
- waitForAnimationToEnd
- assertVisible: "Add Members"

# Switch to Search tab and search for Bob
- tapOn:
    id: "tab-search"
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: "member-search-input"
- inputText: ${USER_B_EMAIL}

# Wait for search results to appear (debounced)
- extendedWaitUntil:
    visible:
      text: "Bob"
    timeout: 8000

- hideKeyboard
- waitForAnimationToEnd
# Tap the result row to select
- tapOn:
    text: "Bob"
    index: 0

# Wait for modal to close or confirmation
- extendedWaitUntil:
    notVisible:
      text: "Cancel"
    timeout: 8000
- waitForAnimationToEnd

# Verify Bob added
- assertVisible:
    text: "Bob Demo"
    optional: true

# Add second expense
- tapOn:
    id: "tab-expenses"
- waitForAnimationToEnd
- tapOn: "Add"
- waitForAnimationToEnd

- tapOn:
    id: "expense-amount-input"
- inputText: "600"
- tapOn:
    id: "expense-description-input"
- inputText: "Cab ride home"
- hideKeyboard
- waitForAnimationToEnd
- tapOn:
    id: "expense-save-btn"
- waitForAnimationToEnd
# Handle WhatsApp notification prompt if it appears
- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd

# Both expenses visible
- extendedWaitUntil:
    visible:
      text: "Cab ride home"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: "Dinner at restaurant"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 10

# Balances updated
- tapOn:
    id: "tab-balances"
- waitForAnimationToEnd
- assertVisible: "Group Balances"
