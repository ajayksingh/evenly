---
# Flow: Alice adds Bob as member, adds second expense
appId: com.ajayksingh.evenly
env:
  USER_B_EMAIL: bob@demo.com
---

- launchApp:
    clearState: false
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Continue with Google"
    file: ./helpers/do_login.yaml

- extendedWaitUntil:
    visible:
      text: "Total balance"
    timeout: 30000

- tapOn: "Groups"
- waitForAnimationToEnd
- tapOn: "E2E Test Group"
- waitForAnimationToEnd

# Members tab → Open unified AddPeopleModal and verify it works
- tapOn:
    id: "tab-members"
- waitForAnimationToEnd
- tapOn:
    id: "add-member-btn"
- waitForAnimationToEnd
- assertVisible: "Add Members"

# Verify tabs are present (Friends is default tab in group-member mode)
- assertVisible:
    id: "tab-friends"
    optional: true
- assertVisible:
    id: "tab-search"
    optional: true

# Verify WhatsApp invite row visible
- assertVisible:
    text: "WhatsApp"
    optional: true

# Close modal — demo accounts can't search Supabase users
- tapOn:
    text: "Cancel"
- waitForAnimationToEnd

# Dismiss any lingering alerts
- tapOn:
    text: "OK"
    optional: true
- waitForAnimationToEnd

# Add second expense
- tapOn:
    id: "tab-expenses"
- waitForAnimationToEnd
- tapOn: "Add"
- waitForAnimationToEnd

- tapOn:
    id: "expense-amount-input"
- inputText: "600"
- tapOn:
    id: "expense-description-input"
- inputText: "Cab ride home"
- hideKeyboard
- waitForAnimationToEnd
- tapOn:
    id: "expense-save-btn"
- waitForAnimationToEnd
# Handle WhatsApp notification prompt if it appears
- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd

# Both expenses visible
- extendedWaitUntil:
    visible:
      text: "Cab ride home"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: "Dinner at restaurant"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 10

# Balances updated
- tapOn:
    id: "tab-balances"
- waitForAnimationToEnd
- assertVisible: "Group Balances"
