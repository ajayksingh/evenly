---
# Flow: Alice adds Bob as member, adds second expense
appId: com.ajayksingh.evenly
env:
  USER_B_EMAIL: bob@demo.com
---

- launchApp:
    clearState: false
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Continue with Google"
    file: ./helpers/do_login.yaml

- extendedWaitUntil:
    visible:
      text: "Total balance"
    timeout: 30000

- tapOn: "Groups"
- waitForAnimationToEnd
- tapOn: "E2E Test Group"
- waitForAnimationToEnd

# Members tab → Add Bob Demo via unified AddPeopleModal (Friends tab for demo accounts)
- tapOn:
    id: "tab-members"
- waitForAnimationToEnd
- tapOn:
    id: "add-member-btn"
- waitForAnimationToEnd
- assertVisible: "Add Members"

# For demo accounts, use Friends tab (search only works with Supabase)
# The Friends tab is the default tab in group-member mode
- tapOn:
    id: "tab-friends"
    optional: true
- waitForAnimationToEnd

# Tap on Bob Demo in the friends list (or try search as fallback)
- tapOn:
    text: "Bob"
    optional: true
- waitForAnimationToEnd

# If Bob wasn't in friends list, try search
- tapOn:
    id: "tab-search"
    optional: true
- tapOn:
    id: "member-search-input"
    optional: true
- inputText: ${USER_B_EMAIL}
- waitForAnimationToEnd

# Dismiss keyboard and try to add
- hideKeyboard
- waitForAnimationToEnd
- tapOn:
    text: "Add"
    optional: true
- waitForAnimationToEnd

# Accept any dialog
- tapOn:
    text: "OK"
    optional: true

# Close modal
- tapOn:
    text: "Cancel"
    optional: true
- waitForAnimationToEnd

# Add second expense
- tapOn:
    id: "tab-expenses"
- waitForAnimationToEnd
- tapOn: "Add"
- waitForAnimationToEnd

- tapOn:
    id: "expense-amount-input"
- inputText: "600"
- tapOn:
    id: "expense-description-input"
- inputText: "Cab ride home"
- hideKeyboard
- waitForAnimationToEnd
- tapOn:
    id: "expense-save-btn"
- waitForAnimationToEnd
# Handle WhatsApp notification prompt if it appears
- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd

# Both expenses visible
- extendedWaitUntil:
    visible:
      text: "Cab ride home"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: "Dinner at restaurant"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 10

# Balances updated
- tapOn:
    id: "tab-balances"
- waitForAnimationToEnd
- assertVisible: "Group Balances"
