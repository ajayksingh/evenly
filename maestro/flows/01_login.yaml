---
# Flow: Login as User A (deepsags@gmail.com)
appId: com.ajayksingh.evenly
env:
  EMAIL: ${USER_A_EMAIL}
  PASS: ${USER_A_PASS}
---
- launchApp:
    clearState: false
- assertVisible:
    text: "Evenly"
    optional: true
# If already logged in, logout first
- runFlow:
    when:
      visible: "Sign In"
    file: ./helpers/do_login.yaml
