---
# Flow: Bob Demo logs in, sees Alice's expense, adds a counter expense
appId: com.ajayksingh.evenly
---

# --- Step 1: Logout Alice ---
- launchApp:
    clearState: false
- waitForAnimationToEnd

# Navigate to profile to logout
- tapOn:
    id: "header-avatar"
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      text: "Sign Out"
- tapOn: "Sign Out"
- waitForAnimationToEnd

# --- Step 2: Login as Bob Demo ---
- assertVisible: "Continue with Google"
- runFlow:
    file: ./helpers/do_login_bob.yaml

# --- Step 3: Navigate to Groups ---
- waitForAnimationToEnd
- tapOn: "Groups"
- waitForAnimationToEnd

# --- Step 4: Open the shared group ---
- tapOn: "Maestro E2E Group"
- waitForAnimationToEnd

# --- Step 5: Verify Alice's expense is visible ---
- assertVisible: "Dinner at restaurant"

# --- Step 6: Check balance shows Bob owes Alice ---
- tapOn:
    id: "tab-balances"
- waitForAnimationToEnd
- assertVisible: "owes"

# --- Step 7: Bob adds a counter expense ---
- tapOn: "Add"
- waitForAnimationToEnd

- tapOn:
    id: "expense-amount-input"
- inputText: "600"

- tapOn:
    id: "expense-description-input"
- inputText: "Cab ride"

- tapOn: "Save"
- waitForAnimationToEnd

# --- Step 8: Verify Bob's expense appears ---
- assertVisible: "Cab ride"

# --- Step 9: Go home and check balance ---
- tapOn:
    text: "Home"
    optional: true
- waitForAnimationToEnd
- assertVisible: "Total balance"
