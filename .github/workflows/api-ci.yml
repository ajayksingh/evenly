name: Evenly API CI

on:
  push:
    branches:
      - main
      - "feat/dropwizard-backend"
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: evenly-api

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Run tests
        run: mvn test -B

      - name: Build fat JAR
        run: mvn package -DskipTests -B

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: evenly-api-jar
          path: evenly-api/target/evenly-api-*.jar
          retention-days: 7
