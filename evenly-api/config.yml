server:
  applicationConnectors:
    - type: http
      port: ${PORT:-8080}
  adminConnectors:
    - type: http
      port: ${ADMIN_PORT:-8081}

database:
  driverClass: org.postgresql.Driver
  url: ${DATABASE_URL}
  user: ${DB_USER:-postgres}
  password: ${DB_PASSWORD}
  properties:
    charSet: UTF-8
  maxWaitForConnection: 1s
  validationQuery: "SELECT 1"
  minSize: 2
  maxSize: 8

supabase:
  jwtSecret: ${SUPABASE_JWT_SECRET}

logging:
  level: INFO
  appenders:
    - type: console
      threshold: ALL
      timeZone: UTC
