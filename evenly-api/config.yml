server:
  applicationConnectors:
    - type: http
      port: ${PORT:-8080}
  adminConnectors:
    - type: http
      port: ${ADMIN_PORT:-8081}
  requestLog:
    appenders:
      - type: console

database:
  driverClass: org.postgresql.Driver
  # Set DATABASE_URL to:
  #   jdbc:postgresql://db.eexxrssfgrybcquoocne.supabase.co:5432/postgres?sslmode=require
  url: ${DATABASE_URL}
  user: ${DB_USER:-postgres}
  password: ${DB_PASSWORD}
  properties:
    charSet: UTF-8
    ssl: "true"
    sslfactory: org.postgresql.ssl.NonValidatingFactory
  maxWaitForConnection: 5s
  validationQuery: "SELECT 1"
  validationQueryTimeout: 3s
  minSize: 2
  maxSize: 10
  checkConnectionWhileIdle: true
  evictionInterval: 10s
  minIdleTime: 1 minute

supabase:
  # Set SUPABASE_JWT_SECRET from:
  #   Supabase Dashboard → Settings → API → JWT Settings → JWT Secret
  jwtSecret: ${SUPABASE_JWT_SECRET}

logging:
  level: INFO
  loggers:
    com.ajayksingh.evenly: INFO
  appenders:
    - type: console
      threshold: ALL
      timeZone: UTC
      logFormat: "%-5p [%d{ISO8601,UTC}] %c{1}: %m%n%rEx"
