version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    env_file:
      - .env
    environment:
      # These can be overridden by the .env file
      PORT: "8080"
      ADMIN_PORT: "8081"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
