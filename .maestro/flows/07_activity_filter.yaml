appId: host.exp.exponent
name: "ACTIVITY-01: Activity screen filter chips work"
---
- runFlow:
    file: "helpers/startup_real.yaml"
- tapOn: "Activity"
- assertVisible: "Activity"
- takeScreenshot: "activity_01_all"

# Verify filter chips present
- assertVisible: "All"
- takeScreenshot: "activity_02_filter_row"

# Tap a group filter if groups exist
- runFlow:
    when:
      notVisible: "No activity yet"
    flow: |
      - tapOn: "All"
      - takeScreenshot: "activity_03_all_selected"
