appId: host.exp.exponent
name: "FRIENDS: Comprehensive friends tab suite"
---
- stopApp
- launchApp:
    clearState: true
- openLink: "exp://10.0.2.2:8082"
- extendedWaitUntil:
    visible: "Splitwise"
    timeout: 60000
- tapOn:
    text: "splitwise"
    optional: true
- extendedWaitUntil:
    visible: "Continue"
    timeout: 30000
- tapOn: "Continue"
- tapOn:
    text: "Reload"
    optional: true
- extendedWaitUntil:
    visible: "Sign In"
    timeout: 30000
- runFlow:
    file: "helpers/login_real.yaml"
- extendedWaitUntil:
    visible: "Total balance"
    timeout: 15000

# ─── 1. FRIENDS TAB LOADS ────────────────────────────────────────────────────
- tapOn: "Friends"
- assertVisible: "Friends"
- takeScreenshot: "friends_01_initial"

# ─── 2. EMPTY STATE ──────────────────────────────────────────────────────────
- assertVisible: "No friends yet"
- assertVisible: "Add by Email"
- takeScreenshot: "friends_02_empty_state"

# ─── 3. OPEN ADD FRIEND MODAL ────────────────────────────────────────────────
- tapOn:
    id: "friends-add-btn"
- extendedWaitUntil:
    visible: "Add Friend"
    timeout: 5000
- assertVisible: "By Email"
- takeScreenshot: "friends_03_add_modal_open"

# ─── 4. CANCEL CLOSES MODAL ──────────────────────────────────────────────────
- tapOn: "Cancel"
- extendedWaitUntil:
    notVisible: "Add Friend"
    timeout: 5000
- assertVisible: "Friends"
- takeScreenshot: "friends_04_cancel_works"

# ─── 5. ADD REAL FRIEND ──────────────────────────────────────────────────────
- tapOn:
    id: "friends-add-btn"
- extendedWaitUntil:
    visible: "Add Friend"
    timeout: 5000
- tapOn:
    id: "friends-email-input"
- inputText: "depsags@gmail.com"
- hideKeyboard
- tapOn:
    id: "friends-add-submit"
- assertVisible: "Friend Added!"
- tapOn: "OK"
- extendedWaitUntil:
    visible: "depsags@gmail.com"
    timeout: 8000
- takeScreenshot: "friends_05_friend_added"

# ─── 6. SUMMARY GRID VISIBLE AFTER FIRST FRIEND ──────────────────────────────
- assertVisible: "owe you"
- assertVisible: "you owe"
- assertVisible: "settled"
- takeScreenshot: "friends_06_summary_grid"

# ─── 7. FRIEND CARD SHOWS EMAIL ──────────────────────────────────────────────
- assertVisible:
    id: "friend-card"
- assertVisible: "depsags@gmail.com"
- assertVisible: "settled up"
- takeScreenshot: "friends_07_friend_card"

# ─── 8. DUPLICATE FRIEND BLOCKED ─────────────────────────────────────────────
- tapOn:
    id: "friends-add-btn"
- extendedWaitUntil:
    visible: "Add Friend"
    timeout: 5000
- tapOn:
    id: "friends-email-input"
- inputText: "depsags@gmail.com"
- hideKeyboard
- tapOn:
    id: "friends-add-submit"
- assertVisible: "Already friends"
- tapOn: "OK"
- tapOn: "Cancel"
- takeScreenshot: "friends_08_duplicate_blocked"

# ─── 9. INVALID EMAIL ERROR ──────────────────────────────────────────────────
- tapOn:
    id: "friends-add-btn"
- extendedWaitUntil:
    visible: "Add Friend"
    timeout: 5000
- tapOn:
    id: "friends-email-input"
- inputText: "ghost@nowhere.xyz"
- hideKeyboard
- tapOn:
    id: "friends-add-submit"
- assertVisible: "Error"
- tapOn: "OK"
- tapOn: "Cancel"
- takeScreenshot: "friends_09_invalid_email"

# ─── 10. SELF-ADD BLOCKED ────────────────────────────────────────────────────
- tapOn:
    id: "friends-add-btn"
- extendedWaitUntil:
    visible: "Add Friend"
    timeout: 5000
- tapOn:
    id: "friends-email-input"
- inputText: "ajsworld@gmail.com"
- hideKeyboard
- tapOn:
    id: "friends-add-submit"
- assertVisible: "Error"
- tapOn: "OK"
- tapOn: "Cancel"
- takeScreenshot: "friends_10_self_add_blocked"

# ─── 11. SECTION HEADER VISIBLE ──────────────────────────────────────────────
- assertVisible: "Settled up"
- takeScreenshot: "friends_11_section_headers"
