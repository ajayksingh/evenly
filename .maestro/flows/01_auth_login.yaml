appId: com.ajayksingh.evenly
name: "AUTH-01: Login and logout cycle"
---
- stopApp
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Sign In"
    timeout: 30000

# Fill real credentials
- tapOn:
    id: "auth-email-input"
- inputText: "alice@demo.com"
- hideKeyboard
- tapOn:
    id: "auth-password-input"
- inputText: "demo123"
- hideKeyboard
- tapOn:
    id: "auth-submit-btn"
- extendedWaitUntil:
    visible: "Total balance"
    timeout: 20000
- takeScreenshot: "auth_01_logged_in"

# Now logout
- runFlow:
    file: "helpers/logout.yaml"
- assertVisible: "Sign In"
- takeScreenshot: "auth_01_logged_out"
