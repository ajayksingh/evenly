appId: host.exp.exponent
name: "FRIENDS-01: Friends tab loads and add friend by email"
---
- runFlow:
    file: "helpers/startup_real.yaml"
- tapOn: "Friends"
- assertVisible: "Friends"
- takeScreenshot: "friends_01_list"

# Tap add friend button
- tapOn:
    id: "friends-add-btn"
- extendedWaitUntil:
    visible: "Add Friend"
    timeout: 8000
- takeScreenshot: "friends_02_modal"

# Enter real second user's email
- tapOn:
    id: "friends-email-input"
- inputText: "depsags@gmail.com"
- hideKeyboard
- tapOn:
    id: "friends-add-submit"

# Either "Already friends" or "Friend Added!" — both are valid
- tapOn:
    text: "OK"
    optional: true
- tapOn:
    text: "Cancel"
    optional: true
- takeScreenshot: "friends_03_result"
