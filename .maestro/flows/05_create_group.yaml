appId: host.exp.exponent
name: "GROUPS-02: Create a new group"
---
- runFlow:
    file: "helpers/startup_real.yaml"
- tapOn: "Groups"
- assertVisible: "Groups"

# Tap the FAB to open create group screen
- tapOn:
    id: "fab-add-group"
- extendedWaitUntil:
    visible: "New Group"
    timeout: 5000
- takeScreenshot: "groups_create_01_form"

# Enter group name
- tapOn:
    id: "group-name-input"
- inputText: "Maestro Test Group"
- hideKeyboard

# Select Trip type
- tapOn:
    id: "group-type-trip"
- takeScreenshot: "groups_create_02_type_selected"

# Create
- tapOn: "Create"
- extendedWaitUntil:
    visible: "Groups"
    timeout: 8000
- assertVisible: "Maestro Test Group"
- takeScreenshot: "groups_create_03_success"
