appId: host.exp.exponent
name: "FRIENDS: Add friends to group — create with members and verify"
---
- stopApp
- launchApp:
    clearState: true
- openLink: "exp://10.0.2.2:8082"
- extendedWaitUntil:
    visible: "Splitwise"
    timeout: 60000
# Tap the project to start loading (clearState may show project picker)
- tapOn:
    text: "splitwise"
    optional: true
# Wait for the Expo project dialog "Continue" button, then dismiss it
- extendedWaitUntil:
    visible: "Continue"
    timeout: 30000
- tapOn: "Continue"
# Developer tools panel may appear after Continue — reload to dismiss and get clean app start
- tapOn:
    text: "Reload"
    optional: true
# Sign In must now be visible (clearState wiped AsyncStorage)
- extendedWaitUntil:
    visible: "Sign In"
    timeout: 30000
- runFlow:
    file: "helpers/login_demo.yaml"
- extendedWaitUntil:
    visible: "Total balance"
    timeout: 15000

# ─── SETUP: add bob and carol as friends ─────────────────────────────────────
- runFlow:
    file: "helpers/setup_friends.yaml"

# ─── 1. CREATE GROUP WITH PRE-SELECTED FRIENDS ───────────────────────────────
- tapOn: "Groups"
- tapOn:
    id: "fab-add-group"
- extendedWaitUntil:
    visible: "New Group"
    timeout: 5000
- tapOn:
    id: "group-name-input"
- inputText: "Friends Group Test"
- hideKeyboard

# Select Home type
- tapOn:
    id: "group-type-home"

# Select Bob from member picker
- assertVisible: "Bob Demo"
- tapOn: "Bob Demo"

# Select Carol from member picker
- assertVisible: "Carol Demo"
- tapOn: "Carol Demo"

# Verify selection count (escape parens — Maestro uses regex matching)
- assertVisible: "Add Members \\(2 selected\\)"
- takeScreenshot: "group_friends_01_members_selected"

# Create the group
- tapOn: "Create"
- extendedWaitUntil:
    visible: "Friends Group Test"
    timeout: 8000
- takeScreenshot: "group_friends_02_group_created"

# ─── 2. GROUP DETAIL: MEMBERS COUNT ──────────────────────────────────────────
- tapOn: "Friends Group Test"
- takeScreenshot: "group_friends_02b_after_tap"
- extendedWaitUntil:
    visible: "members"
    timeout: 15000
- assertVisible: "3 members"
- takeScreenshot: "group_friends_03_group_detail_header"

# ─── 3. MEMBERS TAB: ALL 3 LISTED ────────────────────────────────────────────
- tapOn:
    id: "tab-members"
- extendedWaitUntil:
    visible: "Alice Demo \\(You\\)"
    timeout: 5000
- assertVisible: "Bob Demo"
- assertVisible: "Carol Demo"
- assertVisible: "Admin"
- takeScreenshot: "group_friends_04_members_list"

# ─── 4. ADD MEMBER BUTTON VISIBLE FOR ADMIN ──────────────────────────────────
- assertVisible:
    id: "add-member-btn"
- takeScreenshot: "group_friends_05_add_member_visible"

# ─── 5. OPEN ADD MEMBER MODAL AND SEARCH ─────────────────────────────────────
- tapOn:
    id: "add-member-btn"
- assertVisible: "Add Member"
- tapOn:
    id: "member-search-input"
- inputText: "bob@demo.com"
- hideKeyboard
- tapOn:
    id: "member-search-btn"
- extendedWaitUntil:
    visible: "Bob Demo"
    timeout: 8000
- takeScreenshot: "group_friends_06_member_found"

# Cancel and go back
- tapOn: "Cancel"

# ─── 6. EXPENSES TAB: EMPTY INITIALLY ────────────────────────────────────────
- tapOn:
    id: "tab-expenses"
- assertVisible: "No expenses yet"
- assertVisible: "Add First Expense"
- takeScreenshot: "group_friends_07_no_expenses"

# ─── 7. ADD EXPENSE SPLIT ACROSS ALL 3 MEMBERS ───────────────────────────────
- tapOn: "Add First Expense"
- assertVisible: "Add Expense"
- tapOn:
    id: "expense-description-input"
- inputText: "Group Dinner"
- hideKeyboard
- tapOn:
    id: "expense-amount-input"
- inputText: "3000"
- hideKeyboard
# Verify split preview shows 3 members (1000 each equally)
- scroll
- assertVisible: "Split Preview"
- takeScreenshot: "group_friends_08_split_preview"
- tapOn: "Save"
- extendedWaitUntil:
    visible: "Friends Group Test"
    timeout: 10000
- assertVisible: "Group Dinner"
- takeScreenshot: "group_friends_09_expense_in_list"

# ─── 8. BALANCES TAB: REFLECTS EXPENSE ───────────────────────────────────────
- tapOn:
    id: "tab-balances"
- assertVisible: "Group Balances"
- assertVisible: "gets back"
- takeScreenshot: "group_friends_10_balances_updated"

# ─── 9. SUGGESTED SETTLEMENTS ────────────────────────────────────────────────
- assertVisible: "Suggested Settlements"
- assertVisible: "owes"
- takeScreenshot: "group_friends_11_suggested_settlements"

# ─── 10. HERO STATS UPDATED ──────────────────────────────────────────────────
- tapOn:
    id: "tab-expenses"
- assertVisible: "Total group spending"
- assertVisible: "per person avg"
- takeScreenshot: "group_friends_12_hero_stats"
