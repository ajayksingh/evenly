appId: com.ajayksingh.evenly
name: "FRIENDS: Add friends to group — create with members and verify"
---
- stopApp
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Sign In"
    timeout: 30000
- runFlow:
    file: "helpers/login_real.yaml"
- extendedWaitUntil:
    visible: "Total balance"
    timeout: 15000

# ─── SETUP: add depsags as friend ─────────────────────────────────────────────
- runFlow:
    file: "helpers/setup_friends.yaml"

# ─── 1. CREATE GROUP WITH PRE-SELECTED FRIEND ─────────────────────────────────
- tapOn: "Groups"
- tapOn:
    id: "fab-add-group"
- extendedWaitUntil:
    visible: "New Group"
    timeout: 5000
- tapOn:
    id: "group-name-input"
- inputText: "Friends Group Test"
- hideKeyboard

# Select Home type
- tapOn:
    id: "group-type-home"

# Select friend from member picker (tap by email shown below name)
- assertVisible: "bob@demo.com"
- tapOn: "bob@demo.com"

# Verify selection count
- assertVisible: "Add Members \\(1 selected\\)"
- takeScreenshot: "group_friends_01_members_selected"

# Create the group
- tapOn: "Create"
- extendedWaitUntil:
    visible: "Friends Group Test"
    timeout: 8000
- takeScreenshot: "group_friends_02_group_created"

# ─── 2. GROUP DETAIL: MEMBERS COUNT ──────────────────────────────────────────
- tapOn: "Friends Group Test"
- takeScreenshot: "group_friends_02b_after_tap"
- extendedWaitUntil:
    visible: "members"
    timeout: 15000
- assertVisible: "2 members"
- takeScreenshot: "group_friends_03_group_detail_header"

# ─── 3. MEMBERS TAB: BOTH LISTED ─────────────────────────────────────────────
- tapOn:
    id: "tab-members"
- extendedWaitUntil:
    visible: "Admin"
    timeout: 12000
- assertVisible: "bob@demo.com"
- takeScreenshot: "group_friends_04_members_list"

# ─── 4. ADD MEMBER BUTTON VISIBLE FOR ADMIN ──────────────────────────────────
- assertVisible:
    id: "add-member-btn"
- takeScreenshot: "group_friends_05_add_member_visible"

# ─── 5. OPEN ADD MEMBER MODAL AND SEARCH ─────────────────────────────────────
- tapOn:
    id: "add-member-btn"
- assertVisible: "Add Member"
- tapOn:
    id: "member-search-input"
- inputText: "bob@demo.com"
- hideKeyboard
- tapOn:
    id: "member-search-btn"
- extendedWaitUntil:
    visible: "bob@demo.com"
    timeout: 8000
- takeScreenshot: "group_friends_06_member_found"

# Cancel and go back
- tapOn:
    id: "modal-cancel-btn"
- waitForAnimationToEnd

# ─── 6. EXPENSES TAB: EMPTY INITIALLY ────────────────────────────────────────
- tapOn: "Expenses"
- assertVisible: "No expenses yet"
- assertVisible: "Add First Expense"
- takeScreenshot: "group_friends_07_no_expenses"

# ─── 7. ADD EXPENSE SPLIT ACROSS MEMBERS ─────────────────────────────────────
- tapOn: "Add First Expense"
- assertVisible: "Add Expense"
- tapOn:
    id: "expense-description-input"
- inputText: "Group Dinner"
- hideKeyboard
- tapOn:
    id: "expense-amount-input"
- inputText: "2000"
- hideKeyboard
# Verify split preview
- scroll
- assertVisible: "SPLIT PREVIEW"
- takeScreenshot: "group_friends_08_split_preview"
- tapOn: "Save"
- extendedWaitUntil:
    visible: "Friends Group Test"
    timeout: 10000
- assertVisible: "Group Dinner"
- takeScreenshot: "group_friends_09_expense_in_list"

# ─── 8. BALANCES TAB: REFLECTS EXPENSE ───────────────────────────────────────
- tapOn:
    id: "tab-balances"
- extendedWaitUntil:
    visible: "Group Balances"
    timeout: 12000
- takeScreenshot: "group_friends_10_balances_updated"

# ─── 9. SUGGESTED SETTLEMENTS ────────────────────────────────────────────────
- extendedWaitUntil:
    visible: "Suggested Settlements"
    timeout: 8000
- assertVisible: "Record a Payment"
- takeScreenshot: "group_friends_11_suggested_settlements"

# ─── 10. HERO STATS UPDATED ──────────────────────────────────────────────────
- tapOn:
    id: "tab-expenses"
- assertVisible: "Total group spending"
- assertVisible: "per person avg"
- takeScreenshot: "group_friends_12_hero_stats"
