appId: host.exp.exponent
name: "GROUPS-03: Group detail shows expenses, add expense, delete expense"
---
- runFlow:
    file: "helpers/startup_real.yaml"
- tapOn: "Groups"

# Create group if none exist
- runFlow:
    when:
      visible: "No groups yet"
    flow: |
      - tapOn:
          id: "fab-add-group"
      - extendedWaitUntil:
          visible: "New Group"
          timeout: 5000
      - tapOn:
          id: "group-name-input"
      - inputText: "Detail Test Group"
      - hideKeyboard
      - tapOn: "Create"
      - extendedWaitUntil:
          visible: "Detail Test Group"
          timeout: 8000

# Tap a group
- tapOn:
    index: 0
    text: "member"
    optional: true

- assertVisible: "Expenses"
- assertVisible: "Balances"
- assertVisible: "Members"
- takeScreenshot: "group_detail_01_expenses_tab"

# Add an expense from group detail
- tapOn:
    id: "fab-add-expense"
    optional: true
- runFlow:
    when:
      notVisible: "Add Expense"
    flow: |
      - tapOn: "Add First Expense"
        optional: true
- assertVisible: "Add Expense"
- tapOn:
    id: "expense-description-input"
- inputText: "Group Detail Test Expense"
- hideKeyboard
- tapOn:
    id: "expense-amount-input"
- inputText: "500"
- hideKeyboard
- tapOn: "Save"

# Back on group detail, expense should appear
- extendedWaitUntil:
    visible: "Group Detail Test Expense"
    timeout: 10000
- takeScreenshot: "group_detail_02_expense_added"

# Test Balances tab
- tapOn:
    id: "tab-balances"
- takeScreenshot: "group_detail_04_balances_tab"

# Test Members tab
- tapOn:
    id: "tab-members"
- takeScreenshot: "group_detail_05_members_tab"
