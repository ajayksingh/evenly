appId: com.ajayksingh.evenly
name: "PROFILE-01: Profile screen opens, shows user info"
---
- runFlow:
    file: "helpers/startup_real.yaml"

# Tap header avatar to open profile
- tapOn:
    id: "header-avatar"
- extendedWaitUntil:
    visible: "Account"
    timeout: 8000
- assertVisible: "alice@demo.com"
- takeScreenshot: "profile_01_loaded"

# Go back
- back
- assertVisible: "Total balance"
