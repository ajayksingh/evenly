appId: com.ajayksingh.evenly
name: "EXPENSE-01: Add an expense from FAB"
---
- runFlow:
    file: "helpers/startup_real.yaml"

# Create a group first
- tapOn: "Groups"
- waitForAnimationToEnd
- tapOn:
    id: "fab-add-group"
- extendedWaitUntil:
    visible: "New Group"
    timeout: 5000
- tapOn:
    id: "group-name-input"
- inputText: "Expense Test Group"
- hideKeyboard
- tapOn: "Create"
- extendedWaitUntil:
    visible: "Expense Test Group"
    timeout: 8000

# Open the group and add expense
- tapOn: "Expense Test Group"
- waitForAnimationToEnd
- tapOn: "Add"
- waitForAnimationToEnd
- assertVisible: "Add Expense"
- takeScreenshot: "expense_01_form"

- tapOn:
    id: "expense-description-input"
- inputText: "Maestro Dinner Test"
- hideKeyboard
- tapOn:
    id: "expense-amount-input"
- inputText: "1200"
- hideKeyboard
- takeScreenshot: "expense_02_filled"

- tapOn:
    id: "expense-save-btn"
- extendedWaitUntil:
    visible: "Maestro Dinner Test"
    timeout: 10000
- takeScreenshot: "expense_03_saved"
